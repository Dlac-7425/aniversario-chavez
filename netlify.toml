# Configuración de Netlify para sitio estático.
# Más info: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

# Headers de seguridad básicos — sitio personal, no necesita ser estricto.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=()"

# Cache agresivo para assets estáticos que no cambian seguido.
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
